services:
  api:
    build:
      context: .
      dockerfile: src/ElevatorAPI/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    expose:
      - "8080"
    networks:
      - elevator-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ui:
    build:
      context: src/ElevatorUI
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api-elevator.pegue.app
        NEXT_PUBLIC_WS_URL: wss://api-elevator.pegue.app
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - elevator-network
    restart: unless-stopped

networks:
  elevator-network:
    driver: bridge
